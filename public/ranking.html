<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ranking — Anatomia Topográfica UFMA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #0A1F3D; --ink-soft: #1F3A5F;
  --paper: #FAF7F0; --paper-soft: #F2EDE0;
  --gold: #B8924A; --gold-soft: #D4B47C;
  --rule: #D9D1BD; --muted: #6B6655;
  --silver: #A0A8B4; --bronze: #CD7F32;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'Manrope', sans-serif; background: var(--paper); color: var(--ink); -webkit-font-smoothing: antialiased; }

/* HEADER */
.header { background: var(--ink); color: var(--paper); padding: 24px 48px; border-bottom: 4px solid var(--gold); }
.header-inner { display: flex; align-items: center; gap: 20px; max-width: 860px; margin: 0 auto; }
.emblem { width: 72px; height: 72px; object-fit: contain; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.4)); flex-shrink: 0; }
.header-text { flex: 1; }
.eyebrow { font-size: 10px; letter-spacing: 0.28em; text-transform: uppercase; color: var(--gold-soft); font-weight: 500; margin-bottom: 4px; }
.header-title { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 600; }
.header-title em { font-style: italic; color: var(--gold-soft); }
.back-btn { font-family: inherit; font-size: 12px; font-weight: 500; padding: 9px 16px; border: 1px solid rgba(212,180,124,0.4); background: transparent; color: var(--gold-soft); cursor: pointer; border-radius: 2px; transition: all 0.15s ease; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
.back-btn:hover { background: var(--gold); color: var(--ink); border-color: var(--gold); }

/* MAIN */
.main { max-width: 860px; margin: 0 auto; padding: 48px 24px 80px; }
.rank-title { font-family: 'Cormorant Garamond', serif; font-size: 38px; font-weight: 600; text-align: center; margin-bottom: 6px; }
.rank-title em { font-style: italic; color: var(--gold); }
.rank-sub { font-size: 13px; color: var(--muted); text-align: center; margin-bottom: 40px; }
.rule { width: 40px; height: 2px; background: var(--gold); margin: 16px auto 32px; }

/* PODIUM */
.podium { display: flex; align-items: flex-end; justify-content: center; gap: 16px; margin-bottom: 48px; }
.podium-item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.podium-avatar {
  width: 72px; height: 72px; border-radius: 50%;
  overflow: hidden; border: 3px solid var(--rule);
  background: var(--paper-soft); display: flex; align-items: center; justify-content: center;
  font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 600; color: var(--muted);
}
.podium-avatar img { width: 100%; height: 100%; object-fit: cover; }
.podium-name { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 600; max-width: 120px; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.podium-score { font-size: 12px; color: var(--muted); font-weight: 600; }
.podium-block { border-radius: 4px 4px 0 0; display: flex; align-items: center; justify-content: center; width: 80px; }
.podium-pos { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 700; }

.podium-item.pos-1 .podium-avatar { width: 88px; height: 88px; border-color: var(--gold); border-width: 3px; }
.podium-item.pos-1 .podium-name { font-size: 20px; }
.podium-item.pos-1 .podium-block { background: var(--gold); height: 90px; width: 100px; }
.podium-item.pos-1 .podium-pos { color: var(--ink); }

.podium-item.pos-2 .podium-block { background: var(--silver); height: 65px; }
.podium-item.pos-2 .podium-pos { color: white; }
.podium-item.pos-2 .podium-avatar { border-color: var(--silver); }

.podium-item.pos-3 .podium-block { background: var(--bronze); height: 44px; }
.podium-item.pos-3 .podium-pos { color: white; }
.podium-item.pos-3 .podium-avatar { border-color: var(--bronze); }

/* TABLE */
.rank-table { width: 100%; border-collapse: collapse; }
.rank-table th { font-size: 11px; text-transform: uppercase; letter-spacing: 0.15em; color: var(--muted); font-weight: 600; padding: 0 16px 12px; text-align: left; border-bottom: 2px solid var(--rule); }
.rank-table th.right { text-align: right; }
.rank-table td { padding: 14px 16px; border-bottom: 1px solid var(--rule); font-size: 14px; vertical-align: middle; }
.rank-table td.right { text-align: right; }
.rank-table tr:hover td { background: rgba(184,146,74,0.04); }
.rank-table tr.me td { background: rgba(184,146,74,0.08); }

.rank-pos { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 600; color: var(--muted); width: 48px; }
.rank-avatar {
  width: 40px; height: 40px; border-radius: 50%;
  overflow: hidden; background: var(--paper-soft);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Cormorant Garamond', serif; font-size: 16px; font-weight: 600; color: var(--muted);
  border: 1px solid var(--rule); flex-shrink: 0;
}
.rank-avatar img { width: 100%; height: 100%; object-fit: cover; }
.rank-name-cell { display: flex; align-items: center; gap: 12px; }
.rank-username { font-weight: 600; font-size: 15px; }
.rank-you { font-size: 10px; color: var(--gold); font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; margin-left: 6px; }
.rank-score { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 600; }
.rank-total { font-size: 12px; color: var(--muted); }
.rank-pct { font-weight: 600; font-size: 13px; }
.pct-bar { height: 4px; background: var(--rule); border-radius: 2px; margin-top: 4px; min-width: 60px; }
.pct-fill { height: 100%; background: var(--gold); border-radius: 2px; }

/* EMPTY / LOADING */
.state-msg { text-align: center; padding: 80px 24px; color: var(--muted); }
.spin { width: 36px; height: 36px; border: 3px solid var(--rule); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
@keyframes spin { to { transform: rotate(360deg); } }
.state-title { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-style: italic; color: var(--ink-soft); margin-bottom: 8px; }
.state-sub { font-size: 13px; }

/* STUDENT HEADER */
.student-bar { background: var(--paper-soft); border-bottom: 1px solid var(--rule); padding: 10px 24px; display: flex; align-items: center; gap: 10px; max-width: 860px; margin: 0 auto; }
.sbar-wrap { background: var(--paper-soft); border-bottom: 1px solid var(--rule); }
.sbar-avatar { width: 32px; height: 32px; border-radius: 50%; overflow: hidden; background: rgba(184,146,74,0.15); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: var(--gold); flex-shrink: 0; }
.sbar-avatar img { width: 100%; height: 100%; object-fit: cover; }
.sbar-name { font-size: 13px; font-weight: 600; flex: 1; }
.sbar-logout { font-size: 11px; color: var(--muted); background: none; border: none; cursor: pointer; font-family: inherit; text-decoration: underline; }
.sbar-logout:hover { color: var(--ink); }
.sbar-login { font-size: 12px; color: var(--gold); font-weight: 600; text-decoration: none; }
.sbar-login:hover { color: var(--gold-soft); }

@media (max-width: 600px) {
  .header { padding: 14px 16px; }
  .emblem { width: 48px; height: 48px; }
  .header-title { font-size: 20px; }
  .main { padding: 32px 16px 60px; }
  .rank-title { font-size: 28px; }
  .podium { gap: 10px; }
  .podium-item.pos-1 .podium-avatar { width: 70px; height: 70px; }
  .podium-avatar { width: 58px; height: 58px; }
  .rank-table td, .rank-table th { padding: 10px 10px; }
}
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <img class="emblem" src="logo ufma.png" alt="Logo UFMA">
    <div class="header-text">
      <div class="eyebrow">Universidade Federal do Maranhão · Medicina</div>
      <h1 class="header-title">Monitoria de Anatomia <em>Topográfica</em></h1>
    </div>
    <a href="/" class="back-btn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Início
    </a>
  </div>
</header>

<div class="sbar-wrap" id="sbarWrap" style="display:none">
  <div class="student-bar" id="studentBar"></div>
</div>

<main class="main">
  <h2 class="rank-title"><em>Ranking</em> de Alunos</h2>
  <p class="rank-sub">Pontuação acumulada nas simulações — baseada em auto-avaliação</p>
  <div class="rule"></div>

  <div class="state-msg" id="loadingMsg">
    <div class="spin"></div>
    <div class="state-title">Carregando ranking…</div>
  </div>

  <div id="rankingContent" style="display:none">
    <div class="podium" id="podium"></div>
    <table class="rank-table" id="rankTable">
      <thead>
        <tr>
          <th>#</th>
          <th>Aluno</th>
          <th class="right">Acertos</th>
          <th class="right">Total</th>
          <th class="right">%</th>
        </tr>
      </thead>
      <tbody id="rankBody"></tbody>
    </table>
  </div>

  <div class="state-msg" id="emptyMsg" style="display:none">
    <div class="state-title">Nenhum aluno ainda</div>
    <div class="state-sub">O ranking aparece conforme os alunos completam simulações.</div>
  </div>
</main>

<script>
let currentStudent = null;

function initials(name) {
  return (name || '?').slice(0, 2).toUpperCase();
}

function avatarHTML(student, size = 40) {
  if (student.photo_url) return `<img src="${student.photo_url}" alt="${student.username}">`;
  return initials(student.username);
}

function pct(acertos, total) {
  if (!total) return 0;
  return Math.round((acertos / total) * 100);
}

function renderStudentBar() {
  const wrap = document.getElementById('sbarWrap');
  const bar  = document.getElementById('studentBar');
  if (!currentStudent) {
    bar.innerHTML = `
      <span style="font-size:13px;color:var(--muted);flex:1">Você não está logado</span>
      <a class="sbar-login" href="/aluno-login">Entrar / Criar conta →</a>
    `;
  } else {
    bar.innerHTML = `
      <div class="sbar-avatar">${currentStudent.photo_url ? `<img src="${currentStudent.photo_url}" alt="">` : initials(currentStudent.username)}</div>
      <span class="sbar-name">${currentStudent.username}</span>
      <button class="sbar-logout" onclick="logout()">Sair</button>
    `;
  }
  wrap.style.display = 'block';
}

async function logout() {
  await fetch('/api/alunos/logout', { method: 'POST' });
  currentStudent = null;
  renderStudentBar();
  load();
}

async function load() {
  try {
    const [meRes, rankRes] = await Promise.all([
      fetch('/api/alunos/me'),
      fetch('/api/ranking'),
    ]);
    const { student } = await meRes.json();
    const ranking = await rankRes.json();
    currentStudent = student;
    renderStudentBar();
    renderRanking(ranking);
  } catch {
    document.getElementById('loadingMsg').innerHTML =
      '<div class="state-title">Erro ao carregar</div><div class="state-sub">Tente recarregar a página.</div>';
  }
}

function renderRanking(ranking) {
  document.getElementById('loadingMsg').style.display = 'none';
  if (!ranking.length) { document.getElementById('emptyMsg').style.display = 'block'; return; }
  document.getElementById('rankingContent').style.display = 'block';

  // Podium (top 3)
  const podium = document.getElementById('podium');
  const top3 = ranking.slice(0, 3);
  const order = top3.length >= 3 ? [top3[1], top3[0], top3[2]] : top3.length === 2 ? [top3[1], top3[0]] : [top3[0]];
  const posClass = ['pos-2', 'pos-1', 'pos-3'];
  const posNum   = [2, 1, 3];

  podium.innerHTML = order.map((s, i) => {
    const realPos = posNum[i];
    const isMe = currentStudent && s.id === currentStudent.id;
    const p = pct(s.acertos, s.total);
    return `
      <div class="podium-item pos-${realPos}">
        <div class="podium-avatar">${s.photo_url ? `<img src="${s.photo_url}" alt="">` : initials(s.username)}</div>
        <div class="podium-name">${escHtml(s.username)}${isMe ? ' <span style="font-size:10px;color:var(--gold)">você</span>' : ''}</div>
        <div class="podium-score">${s.acertos} acerto${s.acertos !== 1 ? 's' : ''}</div>
        <div class="podium-block"><span class="podium-pos">${realPos}</span></div>
      </div>`;
  }).join('');

  // Table (all)
  const tbody = document.getElementById('rankBody');
  tbody.innerHTML = ranking.map((s, i) => {
    const isMe = currentStudent && s.id === currentStudent.id;
    const p = pct(s.acertos, s.total);
    return `
      <tr class="${isMe ? 'me' : ''}">
        <td class="rank-pos">${i + 1}</td>
        <td>
          <div class="rank-name-cell">
            <div class="rank-avatar">${s.photo_url ? `<img src="${s.photo_url}" alt="">` : initials(s.username)}</div>
            <div>
              <span class="rank-username">${escHtml(s.username)}</span>
              ${isMe ? '<span class="rank-you">você</span>' : ''}
            </div>
          </div>
        </td>
        <td class="right"><span class="rank-score">${s.acertos}</span></td>
        <td class="right"><span class="rank-total">${s.total}</span></td>
        <td class="right">
          <span class="rank-pct">${p}%</span>
          <div class="pct-bar"><div class="pct-fill" style="width:${p}%"></div></div>
        </td>
      </tr>`;
  }).join('');
}

function escHtml(str) {
  return String(str).replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

load();
</script>
</body>
</html>
